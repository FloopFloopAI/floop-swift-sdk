name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-15
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6

      - name: Verify FloopFloopSDK.version matches tag
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          PKG=$(grep -oE '"[0-9].*"' Sources/FloopFloop/Internal/Version.swift | head -1 | tr -d '"')
          if [ "$TAG" != "$PKG" ]; then
            echo "Tag $GITHUB_REF_NAME (→ $TAG) does not match FloopFloopSDK.version $PKG"
            exit 1
          fi

      - name: Build
        run: swift build -v

      - name: Test
        run: swift test -v

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
          prerelease: ${{ contains(github.ref_name, '-alpha') || contains(github.ref_name, '-beta') || contains(github.ref_name, '-rc') }}

      # Swift Package Manager picks up new versions automatically from
      # the published git tag — no publish step here. Consumers resolve
      # `from: "0.1.0-alpha.1"` directly via SPM.
